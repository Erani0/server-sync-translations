name: Validate Translations

on:
  pull_request:
    paths:
      - 'translations/**'
  push:
    paths:
      - 'translations/**'

jobs:
  validate:
    name: Check Translation Keys
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate all translations
        run: php .github/scripts/validate-translations.php

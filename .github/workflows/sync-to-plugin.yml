name: Sync translations to plugin repo

on:
  push:
    branches:
      - master
    paths:
      - 'translations/**'
      - '.github/workflows/sync-to-plugin.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-to-plugin:
    name: Sync to server-sync repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout translations repo
        uses: actions/checkout@v4
        with:
          path: translations-repo

      - name: Checkout private plugin repo
        uses: actions/checkout@v4
        with:
          repository: Erani0/server-sync
          token: ${{ secrets.SYNC_REPO_PAT }}
          path: plugin-repo

      - name: Detect changes by comparing repos
        id: changes
        run: |
          HAS_CHANGES=false

          for lang_dir in translations-repo/translations/*/; do
            lang_code=$(basename "$lang_dir")
            src="translations-repo/translations/${lang_code}/server-sync.php"
            dest="plugin-repo/lang/${lang_code}/server-sync.php"

            if [ ! -f "$src" ]; then
              continue
            fi

            # New language not yet in plugin repo
            if [ ! -f "$dest" ]; then
              echo "🆕 New language: ${lang_code}"
              HAS_CHANGES=true
              continue
            fi

            # Compare file contents
            if ! diff -q "$src" "$dest" > /dev/null 2>&1; then
              echo "📝 Updated: ${lang_code}"
              HAS_CHANGES=true
            fi
          done

          if [ "$HAS_CHANGES" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No translation changes to sync."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy translations to plugin lang/ folder
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          # Sync ALL translation files (not just changed ones, to be safe)
          for lang_dir in translations-repo/translations/*/; do
            lang_code=$(basename "$lang_dir")
            src="translations-repo/translations/${lang_code}/server-sync.php"
            dest="plugin-repo/lang/${lang_code}/server-sync.php"

            if [ -f "$src" ]; then
              mkdir -p "plugin-repo/lang/${lang_code}"
              cp "$src" "$dest"
              echo "✅ Synced: ${lang_code}/server-sync.php"
            fi
          done

      - name: Bump version, update README badge, build release notes
        if: steps.changes.outputs.has_changes == 'true'
        id: version
        run: |
          cd plugin-repo

          # --- Version bump ---
          CURRENT=$(grep -oP '"version"\s*:\s*"\K[^"]+' plugin.json)
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Update plugin.json
          sed -i "s/\"version\": \"${CURRENT}\"/\"version\": \"${NEW_VERSION}\"/" plugin.json

          # --- Update README badge ---
          if [ -f README.md ]; then
            sed -i "s|version-[0-9]*\.[0-9]*\.[0-9]*-blue|version-${NEW_VERSION}-blue|g" README.md
            echo "✅ README badge updated to ${NEW_VERSION}"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # --- Detect new/updated languages ---
          NEW_LANGS=""
          UPDATED_LANGS=""
          for lang_dir in ../translations-repo/translations/*/; do
            lang_code=$(basename "$lang_dir")
            [ "$lang_code" = "en" ] && continue
            src="../translations-repo/translations/${lang_code}/server-sync.php"
            dest="lang/${lang_code}/server-sync.php"

            if [ ! -f "$dest" ]; then
              NEW_LANGS="${NEW_LANGS} ${lang_code}"
            elif ! diff -q "$src" "$dest" > /dev/null 2>&1; then
              UPDATED_LANGS="${UPDATED_LANGS} ${lang_code}"
            fi
          done

          ALL_LANGS=$(echo $NEW_LANGS $UPDATED_LANGS | xargs)
          echo "all_langs=$ALL_LANGS" >> $GITHUB_OUTPUT

          # --- Build release notes to file ---
          NOTES_FILE="${GITHUB_WORKSPACE}/release-notes.md"
          : > "$NOTES_FILE"  # create empty file (no BOM)
          {
            if [ -n "$NEW_LANGS" ]; then
              printf '### New Languages\n'
              for lang in $NEW_LANGS; do
                printf -- '- `%s`\n' "$lang"
              done
              printf '\n'
            fi
            if [ -n "$UPDATED_LANGS" ]; then
              printf '### Updated Languages\n'
              for lang in $UPDATED_LANGS; do
                printf -- '- `%s`\n' "$lang"
              done
              printf '\n'
            fi

            TOTAL=$(ls -d ../translations-repo/translations/*/ | xargs -I{} basename {} | grep -v '^en$' | wc -l)
            printf '### Total\n'
            printf -- '- **%s** community translations available\n\n' "$TOTAL"
            printf '### Installation\n'
            printf -- '- Download `server-sync.zip` below and extract it into your Pelican Panel `plugins/` directory.\n'
          } >> "$NOTES_FILE"

          # Strip any BOM that might have been added
          sed -i '1s/^\xEF\xBB\xBF//' "$NOTES_FILE"

          echo "notes_file=$NOTES_FILE" >> $GITHUB_OUTPUT

      - name: Commit & push to plugin repo
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd plugin-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage lang/, plugin.json and README changes
          git add lang/ plugin.json README.md

          # Now check if there are staged changes
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit — plugin repo already up to date."
            exit 0
          fi

          git commit -m "lang: sync translations — v${{ steps.version.outputs.new_version }}" \
                      -m "Languages: ${{ steps.version.outputs.all_langs }}"
          git push

      - name: Build release ZIP
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd plugin-repo

          # Create a clean ZIP of the entire plugin (exclude .git)
          zip -r "${GITHUB_WORKSPACE}/server-sync.zip" . -x ".git/*"
          echo "✅ Created server-sync.zip ($(du -h ${GITHUB_WORKSPACE}/server-sync.zip | cut -f1))"

      - name: Create GitHub Release with download
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_REPO_PAT }}
        run: |
          cd plugin-repo

          # Strip any BOM/hidden chars from token (only keep valid PAT characters)
          CLEAN_TOKEN=$(printf '%s' "$GH_TOKEN" | sed 's/[^a-zA-Z0-9_]//g')

          # Create release via GitHub API (curl is BOM-immune)
          RELEASE_BODY=$(cat "${GITHUB_WORKSPACE}/release-notes.md")
          VERSION="v${{ steps.version.outputs.new_version }}"

          # Create the release
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${CLEAN_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/Erani0/server-sync/releases" \
            -d "$(jq -n \
              --arg tag "$VERSION" \
              --arg name "$VERSION - Translation Update" \
              --arg body "$RELEASE_BODY" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false, make_latest: "true"}')")

          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')

          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "::error::Failed to create release: $(echo $RESPONSE | jq -r '.message // "unknown error"')"
            exit 1
          fi

          echo "Release created: $VERSION (ID: $RELEASE_ID)"

          # Upload ZIP asset
          curl -s -X POST \
            -H "Authorization: token ${CLEAN_TOKEN}" \
            -H "Content-Type: application/zip" \
            "https://uploads.github.com/repos/Erani0/server-sync/releases/${RELEASE_ID}/assets?name=server-sync.zip" \
            --data-binary "@${GITHUB_WORKSPACE}/server-sync.zip"

          echo "Release $VERSION published with server-sync.zip download"

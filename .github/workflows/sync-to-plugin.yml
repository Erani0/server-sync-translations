name: Sync translations to plugin repo

on:
  push:
    branches:
      - master
    paths:
      - 'translations/**'
      - '.github/workflows/sync-to-plugin.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-to-plugin:
    name: Sync to server-sync repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout translations repo
        uses: actions/checkout@v4
        with:
          path: translations-repo

      - name: Checkout private plugin repo
        uses: actions/checkout@v4
        with:
          repository: Erani0/server-sync
          token: ${{ secrets.SYNC_REPO_PAT }}
          path: plugin-repo

      - name: Detect changes by comparing repos
        id: changes
        run: |
          HAS_CHANGES=false

          for lang_dir in translations-repo/translations/*/; do
            lang_code=$(basename "$lang_dir")
            src="translations-repo/translations/${lang_code}/server-sync.php"
            dest="plugin-repo/lang/${lang_code}/server-sync.php"

            if [ ! -f "$src" ]; then
              continue
            fi

            # New language not yet in plugin repo
            if [ ! -f "$dest" ]; then
              echo "🆕 New language: ${lang_code}"
              HAS_CHANGES=true
              continue
            fi

            # Compare file contents
            if ! diff -q "$src" "$dest" > /dev/null 2>&1; then
              echo "📝 Updated: ${lang_code}"
              HAS_CHANGES=true
            fi
          done

          if [ "$HAS_CHANGES" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No translation changes to sync."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy translations to plugin lang/ folder
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          # Sync ALL translation files (not just changed ones, to be safe)
          for lang_dir in translations-repo/translations/*/; do
            lang_code=$(basename "$lang_dir")
            src="translations-repo/translations/${lang_code}/server-sync.php"
            dest="plugin-repo/lang/${lang_code}/server-sync.php"

            if [ -f "$src" ]; then
              mkdir -p "plugin-repo/lang/${lang_code}"
              cp "$src" "$dest"
              echo "✅ Synced: ${lang_code}/server-sync.php"
            fi
          done

      - name: Bump patch version in plugin.json
        if: steps.changes.outputs.has_changes == 'true'
        id: version
        run: |
          cd plugin-repo

          # Read current version
          CURRENT=$(grep -oP '"version"\s*:\s*"\K[^"]+' plugin.json)
          echo "Current version: $CURRENT"

          # Bump patch: 1.0.0 → 1.0.1
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Update plugin.json
          sed -i "s/\"version\": \"${CURRENT}\"/\"version\": \"${NEW_VERSION}\"/" plugin.json
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build list of synced languages
        if: steps.changes.outputs.has_changes == 'true'
        id: langs
        run: |
          # Detect which languages are new or updated
          NEW_LANGS=""
          UPDATED_LANGS=""
          for lang_dir in translations-repo/translations/*/; do
            lang_code=$(basename "$lang_dir")
            [ "$lang_code" = "en" ] && continue
            src="translations-repo/translations/${lang_code}/server-sync.php"
            dest="plugin-repo/lang/${lang_code}/server-sync.php"

            if [ ! -f "$dest" ]; then
              NEW_LANGS="${NEW_LANGS} ${lang_code}"
            elif ! diff -q "$src" "$dest" > /dev/null 2>&1; then
              UPDATED_LANGS="${UPDATED_LANGS} ${lang_code}"
            fi
          done

          # Build release notes
          NOTES=""
          if [ -n "$NEW_LANGS" ]; then
            NOTES="### 🆕 New Languages\n"
            for lang in $NEW_LANGS; do
              NOTES="${NOTES}- \`${lang}\`\n"
            done
            NOTES="${NOTES}\n"
          fi
          if [ -n "$UPDATED_LANGS" ]; then
            NOTES="${NOTES}### 📝 Updated Languages\n"
            for lang in $UPDATED_LANGS; do
              NOTES="${NOTES}- \`${lang}\`\n"
            done
            NOTES="${NOTES}\n"
          fi

          # Count total languages (excluding en)
          TOTAL=$(ls -d translations-repo/translations/*/ | xargs -I{} basename {} | grep -v '^en$' | wc -l)
          NOTES="${NOTES}### 📊 Total\n- **${TOTAL}** community translations available"

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "all_langs=$(echo $NEW_LANGS $UPDATED_LANGS | xargs)" >> $GITHUB_OUTPUT

      - name: Commit & push to plugin repo
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd plugin-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage lang/ and plugin.json changes
          git add lang/ plugin.json

          # Now check if there are staged changes
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit — plugin repo already up to date."
            exit 0
          fi

          git commit -m "lang: sync translations — v${{ steps.version.outputs.new_version }}" \
                      -m "Languages: ${{ steps.langs.outputs.all_langs }}"
          git push

      - name: Create GitHub Release
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_REPO_PAT }}
        run: |
          cd plugin-repo
          gh release create "v${{ steps.version.outputs.new_version }}" \
            --title "v${{ steps.version.outputs.new_version }} — Translation Update" \
            --notes "${{ steps.langs.outputs.notes }}" \
            --latest

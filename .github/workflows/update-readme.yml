name: Update README on merge

on:
  push:
    branches:
      - master
    paths:
      - 'translations/**'

permissions:
  contents: write

jobs:
  update-readme:
    name: Update Translation Table
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git log contributor detection

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Update README table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: php .github/scripts/update-readme.php

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet README.md && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update translation table"
          git push
